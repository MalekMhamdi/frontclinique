

<div class="container">

  <div class="overlay"></div>

  <div class="login-card">
    <h2>Login</h2>

  <div class="tabs">
    <button (click)="role='patient'" [class.active]="role==='patient'">Patient</button>
    <button (click)="role='doctor'" [class.active]="role==='doctor'">Doctor</button>
    <button (click)="role='admin'" [class.active]="role==='admin'">Admin</button>
    <button (click)="role='labtech'" [class.active]="role==='labtech'">LabTech</button>
  </div>

  

    <form (ngSubmit)="onLogin()">
      <input type="email" placeholder="Email" />

      <div class="password-field">
        <input type="password" placeholder="Password" />
        <span class="eye">👁</span>
      </div>

      <button class="btn-login" type="submit">Login</button>
    </form>

    <p class="link">
      Don't have an account? <a routerLink="/register">Register</a>
    </p>
  </div>
</div>
