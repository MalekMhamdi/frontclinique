<div class="background">
  <div class="overlay"></div>

  <div class="form-container">
    <h2 class="logo">❤️ Pulse</h2>
    <h3>Register</h3>

    <div class="tabs">
      <button class="active">Patient</button>
      <button>Doctor</button>
      <button>Admin</button>
      <button>LabTech</button>
    </div>

    <form (ngSubmit)="onRegister()">
      <input type="text" placeholder="Name" [(ngModel)]="user.name" name="name" required />
      <input type="email" placeholder="Email" [(ngModel)]="user.email" name="email" required />
      <input type="password" placeholder="Password" [(ngModel)]="user.password" name="password" required />
      <input type="password" placeholder="Confirm Password" [(ngModel)]="confirmPassword" name="confirmPassword" required />

      <button class="register-btn" type="submit">Register</button>
    </form>

    <p class="login-link">
      Have an account? <span routerLink="/login">Login</span>
    </p>
  </div>
</div>
